<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了 | QuickShift DX</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Noto Sans JP',sans-serif;background:#0a1628;color:#f8f6f2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
a{text-decoration:none;color:inherit}
.card{background:#162847;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:3rem 2.5rem;max-width:480px;width:100%}
.icon{width:72px;height:72px;border-radius:18px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:900;margin-bottom:.75rem;letter-spacing:-.02em}
p{font-size:.9rem;color:#7a8fa8;line-height:1.8;margin-bottom:2rem}
.btn{display:inline-flex;align-items:center;gap:8px;background:#ff6b35;color:#fff;padding:14px 28px;border-radius:10px;font-size:.95rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.btn:hover{background:#ff9460;transform:translateY(-2px)}
.logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:900;font-size:1rem;margin-bottom:2rem;justify-content:center}
.logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#ff6b35,#f5c842);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900;color:#fff}
</style>
</head>
<body>
  <div class="card">
    <a href="index.html" class="logo"><div class="logo-mark">Q</div>QuickShift DX</a>
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>送信しました！</h1>
    <p>お問い合わせありがとうございます。<br>内容を確認のうえ、<strong style="color:#f8f6f2">24時間以内</strong>にご連絡いたします。<br>相談・見積もりは完全無料です。</p>
    <a href="index.html" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      トップページへ戻る
    </a>
  </div>
</body>
</html>
